<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales - InventoryPro</title>
    <!-- Tailwind via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { materio: '#FFB547', background: '#F8F9FB' }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/static/css/style.css" rel="stylesheet">
    <!-- Heroicons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F4F5FA; min-height: 100vh; overflow-x: hidden; }
        .pill-active { background-color: #FDEEDC; color: #D97706; }
    </style>
</head>
<body class="text-gray-800">
    <div class="max-w-[1440px] px-8 py-8 mx-auto flex flex-col min-h-screen relative">
        <!-- Top Navbar Area -->
        <header class="flex items-center justify-between mb-10 w-full sticky top-0 bg-[#F4F5FA] pt-8 pb-4 z-50 -mt-8">
            <!-- Brand Logo -->
            <div class="flex items-center space-x-2.5">
                <div class="h-8 w-8 relative flex items-center justify-center">
                    <div class="absolute inset-0 bg-[#FFB547] rounded-tl-lg rounded-bl-lg rounded-br text-transparent" style="transform: skewY(-15deg) scaleY(1.1);"></div>
                    <div class="absolute right-0 bottom-0 top-0 w-2.5 bg-orange-500 rounded-r shadow-sm"></div>
                </div>
                <span class="text-xl font-bold tracking-tight text-gray-900">Materio</span>
            </div>

            <!-- Central Pill Navigation -->
            <nav class="hidden md:flex bg-white rounded-full p-1 shadow-sm border border-gray-100 items-center space-x-1 absolute left-1/2 transform -translate-x-1/2">
                <a href="/" class="text-gray-500 hover:text-gray-800 px-6 py-2 rounded-full text-sm font-medium transition">Dashboard</a>
                <a href="/products" class="text-gray-500 hover:text-gray-800 px-6 py-2 rounded-full text-sm font-medium transition">Products</a>
                <a href="/sales" class="pill-active font-semibold px-6 py-2 rounded-full text-sm transition">Sales</a>
                <a href="/alerts" class="text-gray-500 hover:text-gray-800 px-6 py-2 rounded-full text-sm font-medium transition">Alerts</a>
            </nav>

            <!-- Right Profile & Utilities -->
            <div class="flex items-center space-x-4">
                <div class="relative cursor-pointer text-gray-400 hover:text-gray-700 transition">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                    <span class="absolute -top-0.5 -right-0.5 w-2 h-2 bg-materio rounded-full ring-2 ring-[#F4F5FA]"></span>
                </div>
                <img src="https://ui-avatars.com/api/?name=Admin&background=0F172A&color=fff" alt="Profile" class="w-9 h-9 rounded-full shadow-sm cursor-pointer border-2 border-white">
            </div>
        </header>

        <!-- Main Content Area with Side Icons -->
        <div class="flex flex-1 relative">
            
            <!-- Left Floating Sidebar Icons -->
            <aside class="w-12 flex flex-col items-center space-y-3 sticky top-32 h-fit z-10 hidden md:flex">
                <a href="#" id="btn-calendar" class="w-12 h-12 bg-white rounded-2xl shadow-sm border border-gray-100 flex items-center justify-center text-gray-400 hover:text-gray-700 hover:shadow transition">
                    <i data-lucide="calendar" class="w-5 h-5"></i>
                </a>
                <a href="#" id="btn-chart" class="w-12 h-12 bg-white rounded-2xl shadow-sm border border-gray-100 flex items-center justify-center text-gray-400 hover:text-gray-700 hover:shadow transition">
                    <i data-lucide="bar-chart-2" class="w-5 h-5"></i>
                </a>
                <a href="#" id="btn-truck" class="w-12 h-12 bg-white rounded-2xl shadow-sm border border-gray-100 flex items-center justify-center text-gray-400 hover:text-gray-700 hover:shadow transition">
                    <i data-lucide="truck" class="w-5 h-5"></i>
                </a>
                <a href="#" id="btn-users" class="w-12 h-12 bg-white rounded-2xl shadow-sm border border-gray-100 flex items-center justify-center text-gray-400 hover:text-gray-700 hover:shadow transition">
                    <i data-lucide="users" class="w-5 h-5"></i>
                </a>
                <a href="#" id="btn-alert" class="w-12 h-12 bg-white rounded-2xl shadow-sm border border-gray-100 flex items-center justify-center text-gray-400 hover:text-gray-700 hover:shadow transition">
                    <i data-lucide="alert-triangle" class="w-5 h-5"></i>
                </a>
            </aside>

            <!-- Main Body -->
            <main class="flex-1 w-full md:pl-28">


            
            <div class="mb-6">
                <h1 class="text-3xl font-semibold text-gray-800">Sales</h1>
                <p class="text-gray-500 mt-1">Record a new sale — stock reduces automatically via SQL trigger</p>
            </div>

            <!-- NEW SALE FORM -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-50 overflow-hidden mb-6 stat-card flex flex-col">
                <div class="p-6 border-b border-gray-50 pb-5">
                    <h3 class="text-lg font-semibold text-gray-800">Record New Sale</h3>
                </div>
                <div class="p-6">
                    <div class="grid grid-cols-1 md:grid-cols-12 gap-5 items-end">
                        <div class="md:col-span-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Product</label>
                            <select id="s-product" class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-materio bg-white text-gray-700"><option>Loading...</option></select>
                        </div>
                        <div class="md:col-span-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Customer</label>
                            <select id="s-customer" class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-materio bg-white text-gray-700"><option>Loading...</option></select>
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Quantity</label>
                            <input type="number" id="s-qty" class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-materio text-gray-700" placeholder="1" min="1">
                        </div>
                        <div class="md:col-span-2">
                            <button class="w-full bg-materio hover:bg-orange-400 text-white font-medium py-2 px-4 rounded-lg shadow-[0_2px_10px_rgba(255,181,71,0.3)] transition flex items-center justify-center" onclick="addSale()">
                                <i data-lucide="check-circle" class="w-5 h-5 mr-2"></i> Record Sale
                            </button>
                        </div>
                    </div>
                    <div id="sale-msg" class="mt-4"></div>
                </div>
            </div>



            <!-- SALES TABLE -->
            <div class="bg-white rounded-2xl shadow-sm border border-gray-50 overflow-hidden stat-card flex flex-col">
                <div class="p-6 border-b border-gray-50 pb-5">
                    <h3 class="text-lg font-semibold text-gray-800">All Sales</h3>
                    <p class="text-sm text-gray-500 mt-1">Recent transaction history</p>
                </div>
                <div class="overflow-x-auto w-full">
                    <table class="w-full text-left text-sm whitespace-nowrap">
                        <thead class="bg-gray-50/50 text-gray-500 border-b border-gray-100">
                            <tr>
                                <th class="px-6 py-4 font-medium">#</th>
                                <th class="px-6 py-4 font-medium">Product</th>
                                <th class="px-6 py-4 font-medium">Customer</th>
                                <th class="px-6 py-4 font-medium">Qty Sold</th>
                                <th class="px-6 py-4 font-medium">Total Amount</th>
                                <th class="px-6 py-4 font-medium">Date</th>
                            </tr>
                        </thead>
                        <tbody id="sales-body" class="divide-y divide-gray-50 text-gray-700">
                            <tr><td colspan="6" class="px-6 py-8 text-center text-gray-400">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
            </main>
        </div>
    </div>

    <script>
        lucide.createIcons();

        async function loadDropdowns() {
            const [prods, custs] = await Promise.all([
                fetch("/api/products").then(r => r.json()),
                fetch("/api/customers").then(r => r.json())
            ]);
            document.getElementById("s-product").innerHTML =
                prods.map(p => `<option value="${p.product_id}">${p.product} (Stock: ${p.stock_qty})</option>`).join("");
            document.getElementById("s-customer").innerHTML =
                custs.map(c => `<option value="${c.customer_id}">${c.full_name}</option>`).join("");
        }

        async function loadSales() {
            const res = await fetch("/api/sales");
            const data = await res.json();
            document.getElementById("sales-body").innerHTML = data.map(s => `
                <tr class="hover:bg-gray-50/50 transition border-b border-gray-50">
                    <td class="px-6 py-4"><span class="bg-gray-100 text-gray-600 border border-gray-200 px-2 py-1 rounded-md text-xs font-semibold shadow-sm">#${s.sale_id}</span></td>
                    <td class="px-6 py-4 font-semibold text-gray-900">${s.product}</td>
                    <td class="px-6 py-4 text-gray-500">${s.customer}</td>
                    <td class="px-6 py-4 font-medium">${s.quantity_sold}</td>
                    <td class="px-6 py-4 font-semibold text-gray-900">₹${s.total_amount}</td>
                    <td class="px-6 py-4 text-gray-400 text-xs">${s.sale_date}</td>
                </tr>`).join("");
        }

        async function addSale() {
            const payload = {
                product_id:    document.getElementById("s-product").value,
                customer_id:   document.getElementById("s-customer").value,
                quantity_sold: document.getElementById("s-qty").value
            };
            const res = await fetch("/api/sales", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            const msgDiv = document.getElementById("sale-msg");
            
            if (res.ok) {
                msgDiv.innerHTML = `<div class="bg-gray-50 border border-gray-200 text-gray-800 px-4 py-3 rounded-lg flex items-center text-sm font-medium shadow-sm"><i data-lucide="check-circle" class="w-5 h-5 mr-2 text-gray-600"></i> ${data.message}</div>`;
                document.getElementById("s-qty").value = "";
            } else {
                msgDiv.innerHTML = `<div class="bg-gray-800 border border-gray-700 text-white px-4 py-3 rounded-lg flex items-center text-sm font-medium shadow-sm"><i data-lucide="alert-circle" class="w-5 h-5 mr-2"></i> ${data.error || 'An error occurred'}</div>`;
            }
            
            lucide.createIcons();
            loadSales();
            loadDropdowns();
            setTimeout(() => msgDiv.innerHTML = "", 4000);
        }

        loadDropdowns();
        loadSales();
    </script>
</body>
</html>
